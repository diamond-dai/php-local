<VirtualHost *:80>
	ServerAdmin webmaster@localhost
	DocumentRoot /var/www/html

	<Directory /var/www/html>
		# SSI(mod_include)・.htaccess・ディレクトリ一覧(Indexes)を許可する。
		# Indexes は旧 php-apache-ext（Apache既定でIndexes有効）と同じ挙動に揃えるため。
		# index の無いドキュメント配信ディレクトリでも一覧表示できる。
		Options +Indexes +Includes +FollowSymLinks
		AllowOverride All
		Require all granted
		DirectoryIndex index.php index.html
	</Directory>

	# ローカルDB管理画面。DocumentRoot外に置き、/dbadmin/ で公開する。
	# DB_* 環境変数で自動ログインする（adminer-index.php）。
	RedirectMatch 301 ^/dbadmin$ /dbadmin/
	Alias /dbadmin/ /usr/local/share/adminer/

	<Directory /usr/local/share/adminer>
		DirectoryIndex index.php
		Options -Indexes
		AllowOverride None
		Require all granted
	</Directory>

	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
