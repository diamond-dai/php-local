<VirtualHost *:80>
	ServerAdmin webmaster@localhost
	DocumentRoot /var/www/html

	<Directory /var/www/html>
		# SSI(mod_include) と .htaccess を許可する
		Options +Includes +FollowSymLinks
		AllowOverride All
		Require all granted
		DirectoryIndex index.php index.html
	</Directory>

	# ローカルDB管理画面。DocumentRoot外に置き、/dbadmin/ で公開する。
	# DB_* 環境変数で自動ログインする（adminer-index.php）。
	RedirectMatch 301 ^/dbadmin$ /dbadmin/
	Alias /dbadmin/ /usr/local/share/adminer/

	<Directory /usr/local/share/adminer>
		DirectoryIndex index.php
		Options -Indexes
		AllowOverride None
		Require all granted
	</Directory>

	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
