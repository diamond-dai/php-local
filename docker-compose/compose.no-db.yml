# =============================================================================
# MySQLなしパターン用の compose。
# DBを使わない（または外部DBに接続する）案件向けに httpd だけを起動する。
#
# この案件でMySQLを使わない場合は、本ファイルを compose.yml にリネームすれば
# task コマンド（task dev-up 等）がそのまま使える。元の compose.yml は
# 削除するか退避すること。
# =============================================================================
services:
  # PHP 8.3 + Apache（Adminer・maildump 同梱）
  httpd:
    image: ghcr.io/diamond-dai/php-local
    ports:
      - "${HTTPD_BIND:-127.0.0.1}:${HTTPD_PORT:-80}:80"
    volumes:
      - ./htdocs/:/var/www/html/
      - ./logs/:/var/log/maildump/
    working_dir: /var/www/html
    init: true
    tty: true
    env_file:
      - path: .env
      - path: .env.local
        required: false
