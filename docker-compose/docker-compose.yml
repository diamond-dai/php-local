services:
  # MariaDB
  db:
    image: mariadb:10.11
    volumes:
      - mysql:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/my.cnf:ro
      - ./mysql/mysql_db_dump.sh:/opt/mysql_db_dump.sh:ro
      - ./mysql/data:/mysql-data
      - ./seed/sql:/docker-entrypoint-initdb.d
    env_file:
      - .env
    init: true
    tty: true

  # PHP 8.3 + Apache（Adminer・maildump 同梱）
  httpd:
    image: ghcr.io/diamond-dai/php-local
    ports:
      - "${HTTPD_BIND:-127.0.0.1}:${HTTPD_PORT:-80}:80"
    volumes:
      - ./htdocs/:/var/www/html/
      - ./seed/:/opt/seed/
      - ./logs/:/var/log/maildump/
    working_dir: /var/www/html
    init: true
    tty: true
    env_file:
      - .env
    depends_on:
      - db

volumes:
  mysql:
